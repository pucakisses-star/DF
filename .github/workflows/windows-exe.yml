name: Build Windows executable

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Create a GitHub Release with this tag (e.g. v0.5.1); leave empty to only build artifacts'
        required: false
        type: string
  pull_request:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Package wc3-porter.exe (CLI)
        run: npm run package:win

      - name: Smoke-test the CLI executable
        run: release\wc3-porter.exe help

      - name: Smoke-test the GUI main process
        run: |
          npm run gui:build
          npx electron . --smoke-test

      - name: Package WC3ObjectPorter.exe (GUI)
        run: npx electron-builder --win portable
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: wc3-porter-windows
          path: release/wc3-porter.exe

      - name: Upload GUI artifact
        uses: actions/upload-artifact@v4
        with:
          name: wc3-object-porter-gui-windows
          path: release-gui/WC3ObjectPorter.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          files: |
            release/wc3-porter.exe
            release-gui/WC3ObjectPorter.exe
